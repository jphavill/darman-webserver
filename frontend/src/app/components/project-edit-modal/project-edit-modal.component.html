<div class="project-edit-backdrop" (click)="close()"></div>

<article class="project-edit-modal" role="dialog" aria-modal="true" aria-label="Edit project" (click)="$event.stopPropagation()">
  <div class="project-edit-header">
    <h3>Edit {{ project.title }}</h3>
    <button type="button" class="admin-btn secondary" [disabled]="isSaving" (click)="close()">Close</button>
  </div>

  @if (statusMessage) {
    <p class="status-message">{{ statusMessage }}</p>
  }
  @if (errorMessage) {
    <p class="page-error" role="status">{{ errorMessage }}</p>
  }
  @if (uploadErrorMessage) {
    <p class="page-error" role="status">{{ uploadErrorMessage }}</p>
  }

  <app-project-editor-form
    [value]="editorValue"
    [images]="editorImages"
    [maxImages]="12"
    [fileInputDisabled]="editorImages.length >= 12"
    [uploadHint]="'Choose one or more files to upload. Use Hero, Up, Down, and Delete to manage images.'"
    (valueChange)="patchEditorValue($event)"
    (filesSelected)="uploadImages($event)"
    (imagePatched)="patchImage($event)"
    (setHeroRequested)="setHero($event)"
    (moveRequested)="moveImage($event)"
    (deleteRequested)="deleteImage($event)"
  ></app-project-editor-form>

  <div class="editor-actions">
    <button type="button" class="admin-btn" [disabled]="isSaving" (click)="save()">{{ isSaving ? 'Saving...' : 'Save' }}</button>
    <button type="button" class="admin-btn secondary" [disabled]="isSaving" (click)="close()">Cancel</button>
  </div>
</article>
