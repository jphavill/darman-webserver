<div class="grid-shell">
  <div class="grid-toolbar">
    <div class="view-toggle" role="group" aria-label="Sprint table view">
      <button
        class="icon-button"
        type="button"
        [class.active]="view === 'leaderboard'"
        (click)="setView('leaderboard')"
        aria-label="Leaderboard view"
        title="Leaderboard view"
      >
        <ng-icon name="viewLeaderboard" aria-hidden="true"></ng-icon>
      </button>

      <button
        class="icon-button"
        type="button"
        [class.active]="view === 'advanced'"
        (click)="setView('advanced')"
        aria-label="Advanced table view"
        title="Advanced table view"
      >
        <ng-icon name="viewAdvanced" aria-hidden="true"></ng-icon>
      </button>
    </div>

    <div class="unit-picker">
      <app-sprint-unit-toggle></app-sprint-unit-toggle>
    </div>

    @if (view === 'leaderboard') {
      <div class="range-picker">
        <ng-icon name="calendar" aria-hidden="true"></ng-icon>
        <select [value]="leaderboardRange" (change)="onLeaderboardRangeChange($event)" aria-label="Leaderboard range">
          @for (option of rangeOptions; track option.value) {
            <option [value]="option.value">{{ option.label }}</option>
          }
        </select>
      </div>
    }
  </div>

  <button
    class="reset-columns-button"
    type="button"
    (click)="resetColumnWidths()"
    aria-label="Reset table column widths"
    title="Reset column widths"
  >
    <ng-icon name="resetColumns" aria-hidden="true"></ng-icon>
  </button>

  <ag-grid-angular
    class="ag-theme-quartz sprint-grid"
    [columnDefs]="activeColumnDefs"
    [defaultColDef]="activeDefaultColDef"
    rowModelType="infinite"
    [cacheBlockSize]="pageSize"
    [pagination]="true"
    [paginationPageSize]="pageSize"
    [maxBlocksInCache]="2"
    [animateRows]="true"
    (gridReady)="onGridReady($event)"
    (gridSizeChanged)="onGridSizeChanged($event)"
    (columnResized)="onColumnResized($event)"
  ></ag-grid-angular>
</div>

@if (errorMessage) {
  <p class="error-message">{{ errorMessage }}</p>
}
