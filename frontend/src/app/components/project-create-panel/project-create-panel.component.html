<article class="admin-card admin-create">
  <div class="admin-card-header">
    <h3>Create Project</h3>
    <p>You can queue up to 12 images before you create the project.</p>
    @if (statusMessage) {
      <p class="status-message">{{ statusMessage }}</p>
    }
    @if (errorMessage) {
      <p class="page-error" role="status">{{ errorMessage }}</p>
    }
  </div>

  <app-project-editor-form
    [value]="editorValue"
    [images]="imageQueue"
    [maxImages]="12"
    [fileInputDisabled]="!canSelectMoreImages"
    [uploadHint]="'Choose one or more files to queue. Set hero, alt text, and caption per image below.'"
    (valueChange)="onEditorValueChange($event)"
    (filesSelected)="onCreateImageSelection($event)"
    (imagePatched)="patchImage($event)"
    (setHeroRequested)="setQueueHero($event)"
    (moveRequested)="moveImage($event.imageId, $event.direction)"
    (deleteRequested)="removeImage($event)"
  ></app-project-editor-form>

  <div class="editor-actions">
    <button type="button" class="admin-btn" (click)="submit()" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Creating...' : 'Create Project' }}
    </button>
  </div>
</article>
