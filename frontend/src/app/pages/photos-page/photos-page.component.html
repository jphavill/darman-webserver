<section class="page-intro">
  <h1>Photos</h1>
</section>

<section class="gallery-shell" aria-label="Photo gallery">
  @if (errorMessage) {
    <p class="error-message">{{ errorMessage }}</p>
  }

  <div class="photo-masonry">
    @for (photo of photos; track trackByPhoto($index, photo)) {
      <button class="photo-tile" type="button" (click)="openPhoto(photo, $event)" [attr.aria-label]="'Open photo: ' + photo.altText">
        <img [src]="photo.thumbUrl" [alt]="photo.altText" loading="lazy" decoding="async" (load)="onThumbLoad($event, photo)" />
      </button>
    }
  </div>
</section>

@if (activePhoto) {
  <div class="photo-backdrop" (click)="closePhoto()"></div>

  <article class="photo-modal" role="dialog" aria-modal="true" [attr.aria-label]="activePhoto.altText" (click)="$event.stopPropagation()">
    <button class="close-btn" type="button" (click)="closePhoto()" aria-label="Close photo">
      <ng-icon name="close" aria-hidden="true"></ng-icon>
    </button>

    <img class="photo-modal-image" [src]="activePhoto.fullUrl" [alt]="activePhoto.altText" [ngStyle]="activePhotoImageStyle" decoding="async" (load)="onActivePhotoLoad($event)" />

    <div class="photo-modal-footer">
      <p>{{ activePhoto.caption }}</p>
      <button class="fullscreen-btn" type="button" (click)="openFullResolution()" aria-label="Open full resolution photo">
        <ng-icon name="fullscreen" aria-hidden="true"></ng-icon>
        <span>Fullscreen</span>
      </button>
    </div>
  </article>
}
