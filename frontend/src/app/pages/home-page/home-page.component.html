<div class="container">
  <app-site-header></app-site-header>

  @if (errorMessage()) {
    <p class="page-error" role="status">{{ errorMessage() }}</p>
  }

  @if (canManageProjectContent()) {
    @if (adminStatusMessage()) {
      <p class="status-message">{{ adminStatusMessage() }}</p>
    }
    <app-project-create-panel (createRequested)="createProject($event)"></app-project-create-panel>
  }

  @if (softwareProjects().length > 0) {
    <app-project-section
      title="Software Projects"
      [projects]="softwareProjects()"
      [adminCanManagePublication]="canManageProjectPublication()"
      [adminCanManageContent]="canManageProjectContent()"
      [publicationPendingProjectIds]="pendingProjectPublicationUpdates()"
      (openProjectRequested)="openProject($event)"
      (editRequested)="startEdit($event)"
      (moveRequested)="moveProjectFromPill($event)"
      (publicationToggled)="toggleProjectPublication($event)"
    ></app-project-section>
  }

  @if (physicalProjects().length > 0) {
    <app-project-section
      title="Physical Projects"
      [projects]="physicalProjects()"
      [adminCanManagePublication]="canManageProjectPublication()"
      [adminCanManageContent]="canManageProjectContent()"
      [publicationPendingProjectIds]="pendingProjectPublicationUpdates()"
      (openProjectRequested)="openProject($event)"
      (editRequested)="startEdit($event)"
      (moveRequested)="moveProjectFromPill($event)"
      (publicationToggled)="toggleProjectPublication($event)"
    ></app-project-section>
  }

  @if (editingProject(); as project) {
    <app-project-edit-modal
      [project]="project"
      [statusMessage]="adminStatusMessage()"
      [errorMessage]="errorMessage()"
      [isSaving]="isSavingProjectEdit()"
      (closed)="cancelEdit()"
      (saveRequested)="saveEdit($event)"
    ></app-project-edit-modal>
  }

  <app-site-footer></app-site-footer>

  <app-project-overlay
    [activeProject]="activeProject"
    [overlayVisible]="overlayVisible"
    [isExpanded]="isExpanded"
    [expandedStyle]="expandedStyle"
    [activeProjectMarkdown]="activeProjectMarkdown"
    (closeRequested)="closeProject()"
  ></app-project-overlay>
</div>
