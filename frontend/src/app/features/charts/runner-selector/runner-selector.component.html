<section class="runner-selector">
  <div class="runner-search-row">
    <div class="search-input-wrap">
      <input
        type="text"
        [ngModel]="searchTerm"
        (focus)="openDropdown()"
        (blur)="closeDropdown()"
        (keydown.enter)="onEnterKey($event)"
        (ngModelChange)="onSearchTermChange($event)"
        placeholder="Runner"
        aria-label="Search runners"
        />

      @if (dropdownOpen && filteredRunners.length > 0) {
        <ul class="runner-dropdown">
          @for (runner of filteredRunners; track runner) {
            <li
              [class.is-disabled]="!canAdd(runner)"
              (mousedown)="selectFromDropdown(runner)"
              >
              {{ runner.name }}
            </li>
          }
        </ul>
      }
    </div>
  </div>
</section>
