<section class="runner-selector">
  <h3>Runner Selector</h3>

  <div class="runner-search-row">
    <input
      type="text"
      list="runner-options"
      [ngModel]="searchTerm"
      (ngModelChange)="searchTermChange.emit($event)"
      placeholder="Type runner name"
      aria-label="Search runners"
    />
    <datalist id="runner-options">
      <option *ngFor="let runner of filteredRunners" [value]="runner.name"></option>
    </datalist>

    <button
      type="button"
      [disabled]="!addCandidate || selectedPersonIds.length >= maxSelected"
      (click)="addFromSearch()"
    >
      Add
    </button>
  </div>

  <small *ngIf="searchTerm && !addCandidate">Type the full name or narrow to one runner.</small>
</section>
