<section class="selected-runners">
  <ul>
    <li *ngFor="let runner of runners">
      <input
        class="color-input"
        type="color"
        [value]="runner.color"
        [attr.aria-label]="'Choose color for ' + runner.personName"
        (change)="colorChange.emit({ personId: runner.personId, color: $any($event.target).value })"
      />
      <span>{{ runner.personName }}</span>
      <label>
        <input
          type="checkbox"
          [checked]="runner.visible"
          (change)="visibilityChange.emit({ personId: runner.personId, visible: $any($event.target).checked })"
        />
        Visible
      </label>
      <button type="button" (click)="removeRunner.emit(runner.personId)">Remove</button>
    </li>
  </ul>
</section>
