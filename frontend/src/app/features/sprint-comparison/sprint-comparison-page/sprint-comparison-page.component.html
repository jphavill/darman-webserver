<section class="comparison-header">
  <h1>Sprint Comparison</h1>
</section>

<section class="comparison-layout">
  <app-sprint-comparison-controls
    [mode]="state().mode"
    [runWindow]="state().runWindow"
    [location]="state().location"
    [showBenchmarks]="state().showBenchmarks"
    [runnerSearch]="state().runnerSearch"
    [availableRunners]="state().availableRunners"
    [availableLocations]="state().availableLocations"
    [selectedRunners]="state().selectedRunners"
    [maxRunners]="maxRunnerCount"
    (modeChange)="onModeChange($event)"
    (locationChange)="onLocationChange($event)"
    (runWindowChange)="onRunWindowChange($event)"
    (runnerSearchChange)="onRunnerSearchChange($event)"
    (showBenchmarksChange)="onShowBenchmarksChange($event)"
    (addRunner)="onAddRunner($event)"
    (removeRunner)="onRemoveRunner($event)"
    (runnerColorChange)="onRunnerColorChange($event)"
    (runnerVisibilityChange)="onRunnerVisibilityChange($event)"
    (clearSelections)="onClearSelections()"
    (resetFilters)="onResetFilters()"
  ></app-sprint-comparison-controls>

  <app-sprint-comparison-chart
    [mode]="state().mode"
    [series]="state().series"
    [displayUnit]="displayUnit()"
    [selectedRunners]="state().selectedRunners"
    [showBenchmarks]="state().showBenchmarks"
    [loading]="state().loading"
    [error]="state().error"
  ></app-sprint-comparison-chart>
</section>
